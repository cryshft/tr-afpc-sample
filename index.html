<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자동낚시 포인트 계산기</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="root">
    <div class="bbl" style="width:8px;height:8px;left:12%;bottom:18%;animation-delay:0s;animation-duration:3.4s;"></div>
    <div class="bbl" style="width:6px;height:6px;left:52%;bottom:22%;animation-delay:1.1s;animation-duration:4.4s;"></div>
    <div class="bbl" style="width:9px;height:9px;left:78%;bottom:13%;animation-delay:2.3s;animation-duration:3.9s;"></div>
    <div class="fish">🐠</div>

    <div class="panel-outermost">
      <div class="panel-outer">

        <div class="info-wrapper">
          <div class="potion-section-outer">
            <div class="potion-section info-section">
              <div class="info-title"><span>자동낚시 정보</span></div>
              <div class="inner-box">
                <div class="bar-row">
                  <div class="bar-icon fish-ic">🐟</div>
                  <div class="bar-track">
                    <div class="bar-fill" id="bar-fill" style="width:0%"></div>
                    <span class="bar-label" id="bar-label">0 / 0</span>

                  </div>
                </div>
              </div>
              <div class="inner-box">
                <div class="input-row">
                  <div class="igroup">
                    <label for="cur">현재 포인트</label>
                    <input type="text" inputmode="numeric" id="cur" value="0">
                  </div>
                  <div class="igroup">
                    <label for="goal">목표 포인트</label>
                    <input type="text" inputmode="numeric" id="goal" value="0">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="potion-wrapper no-result" id="potion-wrapper">
          <div class="potion-section-outer">
            <div class="potion-section">
              <div class="potion-header">
                <div class="potion-name">
                  자동낚시 포션(미니)
                  <div class="tooltip-wrap">
                    <div class="tooltip-btn">?</div>
                    <div class="tooltip-box">1개당 +60 pt</div>
                  </div>
                </div>
              </div>
              <div class="potion-ctrl">
                <button class="pbtn pbtn-mini" data-type="mini" data-delta="-10">−10</button>
                <button class="pbtn pbtn-mini" data-type="mini" data-delta="-1">−</button>
                <input type="text" inputmode="numeric" class="pcount-input" id="pcnt-mini" value="0">
                <button class="pbtn pbtn-mini" data-type="mini" data-delta="1">+</button>
                <button class="pbtn pbtn-mini" data-type="mini" data-delta="10">+10</button>
              </div>
            </div>
          </div>
          <div class="potion-section-outer">
            <div class="potion-section">
              <div class="potion-header">
                <div class="potion-name">
                  자동낚시 포션(일반)
                  <div class="tooltip-wrap">
                    <div class="tooltip-btn">?</div>
                    <div class="tooltip-box">1개당 +100 pt</div>
                  </div>
                </div>
              </div>
              <div class="potion-ctrl">
                <button class="pbtn pbtn-general" data-type="gen" data-delta="-10">−10</button>
                <button class="pbtn pbtn-general" data-type="gen" data-delta="-1">−</button>
                <input type="text" inputmode="numeric" class="pcount-input" id="pcnt-gen" value="0">
                <button class="pbtn pbtn-general" data-type="gen" data-delta="1">+</button>
                <button class="pbtn pbtn-general" data-type="gen" data-delta="10">+10</button>
              </div>
            </div>
          </div>
        </div>

        <div class="result-section" id="result-section">
          <div class="rbox">
            <div class="rlabel" id="r-label">목표까지 필요 포션</div>
            <div class="rval" id="r-need">—</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const PER_MINI = 60;
    const PER_GEN  = 100;
    const MAX      = 10000;
    // Math.floor(MAX / PER_MINI) = 166 → 올림 여유 포함 167
    const MAX_MINI = Math.ceil(MAX / PER_MINI);
    const MAX_GEN  = Math.ceil(MAX / PER_GEN);

    const $ = id => document.getElementById(id);

    function getInt(id, fallback = 0) {
      return parseInt($( id).value, 10) || fallback;
    }

    /* ── 숫자 이외 입력 차단 ── */
    function blockNonDigit(e) {
      if (e.ctrlKey || e.metaKey) return;
      if (['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Enter','Home','End'].includes(e.key)) return;
      if (!/^\d$/.test(e.key)) e.preventDefault();
    }

    function stripNonDigit(el) {
      const pos  = el.selectionStart;
      const prev = el.value;
      el.value   = el.value.replace(/\D/g, '');
      if (el.value !== prev) {
        const delta = el.value.length - prev.length;
        el.setSelectionRange(Math.max(0, pos + delta), Math.max(0, pos + delta));
      }
    }

    document.querySelectorAll('input').forEach(el => {
      el.addEventListener('keydown', blockNonDigit);
      el.addEventListener('input', () => stripNonDigit(el));
      el.addEventListener('compositionend', () => stripNonDigit(el));
    });

    /* ── 현재·목표 포인트 ── */
    function clampInput(id) {
      const el  = $(id);
      const val = parseInt(el.value, 10) || 0;
      el.value  = Math.min(MAX, val);       
    }

    function onCur()  { clampInput('cur');  update(); }
    function onGoal() { clampInput('goal'); update(); }

    $('cur').addEventListener('input', onCur);
    $('goal').addEventListener('input', onGoal);

    /* ── 포션 입력 ── */
    function onPcnt(type) {
      const id     = type === 'mini' ? 'pcnt-mini' : 'pcnt-gen';
      const maxVal = type === 'mini' ? MAX_MINI : MAX_GEN;
      const el     = $(id);
      const val    = getInt(id);
      if (val > maxVal) el.value = maxVal;
      syncDisable();
      update();
    }

    $('pcnt-mini').addEventListener('input', () => onPcnt('mini'));
    $('pcnt-gen').addEventListener('input',  () => onPcnt('gen'));

    /* ── 포션 버튼 (data-type / data-delta) ── */
    document.querySelectorAll('.pbtn[data-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        const type   = btn.dataset.type;
        const delta  = parseInt(btn.dataset.delta, 10);
        const id     = type === 'mini' ? 'pcnt-mini' : 'pcnt-gen';
        const maxVal = type === 'mini' ? MAX_MINI : MAX_GEN;
        const el     = $(id);
        el.value = Math.min(maxVal, Math.max(0, getInt(id) + delta));
        syncDisable();
        update();
      });
    });

    /* ── 상호 잠금 ── */
    function syncDisable() {
      const mini = getInt('pcnt-mini');
      const gen  = getInt('pcnt-gen');

      const lockGen  = mini > 0;
      const lockMini = gen  > 0;

      const miniEl = $('pcnt-mini');
      const genEl  = $('pcnt-gen');

      miniEl.disabled = lockMini;
      genEl.disabled  = lockGen;
      miniEl.classList.toggle('ctrl-disabled', lockMini);
      genEl.classList.toggle('ctrl-disabled',  lockGen);

      document.querySelectorAll('.pbtn-mini').forEach(b => {
        b.disabled = lockMini;
        b.classList.toggle('ctrl-disabled', lockMini);
      });
      document.querySelectorAll('.pbtn-general').forEach(b => {
        b.disabled = lockGen;
        b.classList.toggle('ctrl-disabled', lockGen);
      });
    }

    /* ── 렌더링 ── */
    function update() {
      const cur     = Math.min(MAX, getInt('cur'));
      const goal    = Math.min(MAX, getInt('goal'));
      const potMini = getInt('pcnt-mini');
      const potGen  = getInt('pcnt-gen');

      const gained  = potMini * PER_MINI + potGen * PER_GEN;
      const after   = Math.min(MAX, cur + gained);
      const pct     = goal > 0 ? Math.min(100, Math.round(after / goal * 1000) / 10) : 0;

      $('bar-fill').style.width  = pct + '%';
      $('bar-label').textContent = after + ' / ' + goal;

      const resultSection  = $('result-section');
      const potionWrapper  = $('potion-wrapper');
      const rLabel         = $('r-label');
      const rVal           = $('r-need');
      const hasPotion      = potMini > 0 || potGen > 0;

      resultSection.classList.toggle('visible', hasPotion);
      potionWrapper.classList.toggle('no-result', !hasPotion);

      if (!hasPotion) return;

      const remainPt = Math.max(0, goal - after);

      if (after >= goal) {
        rLabel.textContent = '목표 달성!';
        rVal.textContent   = '0 개';
        rVal.className     = 'rval ok';
        return;
      }

      rVal.className = 'rval';

      if (potMini > 0 && potGen === 0) {
        rLabel.textContent = '목표까지 필요 포션 (미니)';
        rVal.textContent   = Math.ceil(remainPt / PER_MINI) + ' 개';
      } else if (potGen > 0 && potMini === 0) {
        rLabel.textContent = '목표까지 필요 포션 (일반)';
        rVal.textContent   = Math.ceil(remainPt / PER_GEN) + ' 개';
      } else {
        const needMini = Math.ceil(remainPt / PER_MINI);
        const needGen  = Math.ceil(remainPt / PER_GEN);
        if (needGen <= needMini) {
          rLabel.textContent = '목표까지 필요 포션 (일반)';
          rVal.textContent   = needGen + ' 개';
        } else {
          rLabel.textContent = '목표까지 필요 포션 (미니)';
          rVal.textContent   = needMini + ' 개';
        }
      }
    }

    update();
  </script>
</body>
</html>
